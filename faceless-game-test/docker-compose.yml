services:
  separation-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: faceless-beat-separation-worker
    gpus: all
    environment:
      SEPARATION_WORKER_PORT: "${SEPARATION_WORKER_PORT:-8792}"
      SEPARATION_ENGINE: "${SEPARATION_ENGINE:-bs_roformer}"
      BS_ROFORMER_MODEL_SLUG: "${BS_ROFORMER_MODEL_SLUG:-roformer-model-bs-roformer-sw-by-jarredou}"
      BS_ROFORMER_MODELS_DIR: "${BS_ROFORMER_MODELS_DIR:-/app/worker-models}"
      BS_ROFORMER_OUTPUT_DIR: "${BS_ROFORMER_OUTPUT_DIR:-/app/worker-output}"
      HF_HUB_ENABLE_HF_TRANSFER: "${HF_HUB_ENABLE_HF_TRANSFER:-1}"
      HF_HUB_DISABLE_TELEMETRY: "${HF_HUB_DISABLE_TELEMETRY:-1}"
      HF_XET_HIGH_PERFORMANCE: "${HF_XET_HIGH_PERFORMANCE:-1}"
      BS_ROFORMER_DOWNLOAD_ATTEMPTS: "${BS_ROFORMER_DOWNLOAD_ATTEMPTS:-8}"
      BS_ROFORMER_MIN_CKPT_BYTES: "${BS_ROFORMER_MIN_CKPT_BYTES:-500000000}"
      BS_ROFORMER_BOOTSTRAP_ON_START: "${BS_ROFORMER_BOOTSTRAP_ON_START:-1}"
      BS_ROFORMER_BOOTSTRAP_TIMEOUT_SECONDS: "${BS_ROFORMER_BOOTSTRAP_TIMEOUT_SECONDS:-1800}"
      BS_ROFORMER_INFER_NUM_OVERLAP: "${BS_ROFORMER_INFER_NUM_OVERLAP:-8}"
      BS_ROFORMER_INFER_CHUNK_SIZE: "${BS_ROFORMER_INFER_CHUNK_SIZE:-881664}"
      BS_ROFORMER_INFER_NORMALIZE: "${BS_ROFORMER_INFER_NORMALIZE:-1}"
      BS_ROFORMER_SAVE_STEMS_PER_RUN: "${BS_ROFORMER_SAVE_STEMS_PER_RUN:-1}"
      BS_ROFORMER_STEM_RUNS_DIR: "${BS_ROFORMER_STEM_RUNS_DIR:-stem-runs}"
      BEAT_SEPARATION_TIMEOUT_SECONDS: "${BEAT_SEPARATION_TIMEOUT_SECONDS:-1200}"
      BEAT_ANALYSIS_TIMEOUT_SECONDS: "${BEAT_ANALYSIS_TIMEOUT_SECONDS:-1200}"
      BEAT_ANALYSIS_HOP_LENGTH: "${BEAT_ANALYSIS_HOP_LENGTH:-512}"
      BEAT_ANALYSIS_ONSET_MIN_STRENGTH: "${BEAT_ANALYSIS_ONSET_MIN_STRENGTH:-0.10}"
      BEAT_ANALYSIS_ONSET_MIN_DISTANCE_SECONDS: "${BEAT_ANALYSIS_ONSET_MIN_DISTANCE_SECONDS:-0.11}"
      BEAT_ANALYSIS_ADAPTIVE_WINDOW_SECONDS: "${BEAT_ANALYSIS_ADAPTIVE_WINDOW_SECONDS:-0.45}"
      BEAT_ANALYSIS_STRICT_K: "${BEAT_ANALYSIS_STRICT_K:-1.15}"
      BEAT_ANALYSIS_PERMISSIVE_K: "${BEAT_ANALYSIS_PERMISSIVE_K:-0.62}"
      BEAT_ANALYSIS_GAP_TRIGGER_SECONDS: "${BEAT_ANALYSIS_GAP_TRIGGER_SECONDS:-0.24}"
      BEAT_ANALYSIS_SUSTAIN_MIN_DURATION_SECONDS: "${BEAT_ANALYSIS_SUSTAIN_MIN_DURATION_SECONDS:-0.08}"
      BEAT_ANALYSIS_SUSTAIN_MERGE_GAP_SECONDS: "${BEAT_ANALYSIS_SUSTAIN_MERGE_GAP_SECONDS:-0.14}"
      BEAT_ANALYSIS_SUSTAIN_BRIDGE_FLOOR: "${BEAT_ANALYSIS_SUSTAIN_BRIDGE_FLOOR:-0.25}"
      BEAT_ANALYSIS_SUSTAIN_MAX_PITCH_JUMP_SEMITONES: "${BEAT_ANALYSIS_SUSTAIN_MAX_PITCH_JUMP_SEMITONES:-3.0}"
      BEAT_ANALYSIS_SUSTAIN_SPLIT_ON_PITCH_CHANGE: "${BEAT_ANALYSIS_SUSTAIN_SPLIT_ON_PITCH_CHANGE:-1}"
      BEAT_ANALYSIS_SUSTAIN_MIN_PITCH_CONFIDENCE: "${BEAT_ANALYSIS_SUSTAIN_MIN_PITCH_CONFIDENCE:-0.45}"
      BEAT_ANALYSIS_SUSTAIN_ENABLE_CONTINUOUS_PITCH_SPLIT: "${BEAT_ANALYSIS_SUSTAIN_ENABLE_CONTINUOUS_PITCH_SPLIT:-1}"
      BEAT_ANALYSIS_SUSTAIN_PITCH_SPLIT_THRESHOLD_SEMITONES: "${BEAT_ANALYSIS_SUSTAIN_PITCH_SPLIT_THRESHOLD_SEMITONES:-0.75}"
      BEAT_ANALYSIS_SUSTAIN_PITCH_SPLIT_MIN_SEGMENT_SECONDS: "${BEAT_ANALYSIS_SUSTAIN_PITCH_SPLIT_MIN_SEGMENT_SECONDS:-0.20}"
      BEAT_ANALYSIS_SUSTAIN_PITCH_SPLIT_MIN_VOICED_PROBABILITY: "${BEAT_ANALYSIS_SUSTAIN_PITCH_SPLIT_MIN_VOICED_PROBABILITY:-0.70}"
      BEAT_ANALYSIS_LOW_FMIN: "${BEAT_ANALYSIS_LOW_FMIN:-20}"
      BEAT_ANALYSIS_LOW_FMAX: "${BEAT_ANALYSIS_LOW_FMAX:-180}"
      BEAT_ANALYSIS_MID_FMIN: "${BEAT_ANALYSIS_MID_FMIN:-180}"
      BEAT_ANALYSIS_MID_FMAX: "${BEAT_ANALYSIS_MID_FMAX:-2200}"
      BEAT_ANALYSIS_HIGH_FMIN: "${BEAT_ANALYSIS_HIGH_FMIN:-2200}"
      BEAT_ANALYSIS_HIGH_FMAX: "${BEAT_ANALYSIS_HIGH_FMAX:-12000}"
      BEAT_ANALYSIS_LOW_WEIGHT: "${BEAT_ANALYSIS_LOW_WEIGHT:-1.15}"
      BEAT_ANALYSIS_MID_WEIGHT: "${BEAT_ANALYSIS_MID_WEIGHT:-1.00}"
      BEAT_ANALYSIS_HIGH_WEIGHT: "${BEAT_ANALYSIS_HIGH_WEIGHT:-0.90}"
      BEAT_STORAGE_DIR: "${BEAT_STORAGE_DIR:-/app/beat-storage}"
    volumes:
      - ./beat-storage:/app/beat-storage
      - worker_models:/app/worker-models

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: faceless-beat-backend
    ports:
      - "8787:8787"
    environment:
      BEAT_API_PORT: "${BEAT_API_PORT:-8787}"
      BEAT_STORAGE_DIR: "${BEAT_STORAGE_DIR:-/app/beat-storage}"
      BEAT_API_MAX_BODY_BYTES: "${BEAT_API_MAX_BODY_BYTES:-52428800}"
      BEAT_SEPARATION_WORKER_URL: "${BEAT_SEPARATION_WORKER_URL:-http://separation-worker:8792}"
      BEAT_SEPARATION_LOG_TAIL_LINES: "${BEAT_SEPARATION_LOG_TAIL_LINES:-200}"
    volumes:
      - ./beat-storage:/app/beat-storage
    depends_on:
      - separation-worker

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_BEAT_API_BASE_URL: "${VITE_BEAT_API_BASE_URL:-http://localhost:8787}"
    container_name: faceless-beat-frontend
    depends_on:
      - backend
    ports:
      - "5173:4173"

volumes:
  worker_models:
