version: "3.9"

services:
  db-bootstrap:
    image: alpine:3.20
    container_name: faceless-db-bootstrap
    command:
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /persistent-data
        if [ -f /persistent-data/faceless-dancer.db ]; then
          echo "Persistent DB already present at /persistent-data/faceless-dancer.db"
          exit 0
        fi
        if [ -f /legacy-data/faceless-dancer.db ]; then
          cp /legacy-data/faceless-dancer.db /persistent-data/faceless-dancer.db
          echo "Copied legacy DB to persistent path."
          exit 0
        fi
        echo "No legacy DB found; starting with empty persistent DB path."
    volumes:
      - ./data:/persistent-data
      - db-data:/legacy-data:ro
    restart: "no"

  separation-worker:
    build:
      context: ./faceless-game-test
      dockerfile: Dockerfile.worker
    container_name: faceless-beat-separation-worker
    environment:
      SEPARATION_WORKER_PORT: "${SEPARATION_WORKER_PORT:-8792}"
      BEAT_STORAGE_DIR: /app/beat-storage
      BS_ROFORMER_MIN_CKPT_BYTES: "50000000"
      BS_ROFORMER_INFER_DEVICE: "${BS_ROFORMER_INFER_DEVICE:-cpu}"
    volumes:
      - ./beat-storage:/app/beat-storage
      - worker-models:/app/worker-models
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: faceless-dancer-server
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
      separation-worker:
        condition: service_started
    env_file:
      - ./.env
    environment:
      DATABASE_PATH: /app/data/faceless-dancer.db
      BEAT_STORAGE_DIR: /app/beat-storage
      BEAT_SEPARATION_WORKER_URL: http://separation-worker:8792
    volumes:
      - ./data:/app/data
      - ./beat-storage:/app/beat-storage
    ports:
      - "127.0.0.1:3001:3001"
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: faceless-dancer-client
    depends_on:
      - server
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped

volumes:
  db-data:
  worker-models:
