services:
  redis:
    image: redis:7-alpine
    container_name: faceless-dancer-redis
    command: ["redis-server", "--save", "", "--appendonly", "no", "--port", "${REDIS_PORT:-6379}"]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: faceless-dancer-postgres
    command: ["postgres", "-c", "port=${POSTGRES_PORT:-5432}"]
    environment:
      POSTGRES_DB: faceless_dancer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ${POSTGRES_HOST_PATH:-/var/lib/faceless-dancer/postgres}:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-55432}:${POSTGRES_PORT:-5432}"
    restart: unless-stopped

  separation-worker:
    build:
      context: ./faceless-game-test
      dockerfile: Dockerfile.worker
    container_name: faceless-beat-separation-worker
    environment:
      SEPARATION_WORKER_PORT: "${SEPARATION_WORKER_PORT:-8792}"
      BEAT_STORAGE_DIR: /app/beat-storage
      BS_ROFORMER_MIN_CKPT_BYTES: "50000000"
      BS_ROFORMER_INFER_DEVICE: "${BS_ROFORMER_INFER_DEVICE:-cpu}"
      LYRICS_TIMEOUT_SECONDS: "${LYRICS_TIMEOUT_SECONDS:-1800}"
      LYRICS_WHISPER_MODEL_SIZE: "${LYRICS_WHISPER_MODEL_SIZE:-small}"
      LYRICS_WHISPER_DEVICE: "${LYRICS_WHISPER_DEVICE:-cpu}"
      LYRICS_WHISPER_COMPUTE_TYPE: "${LYRICS_WHISPER_COMPUTE_TYPE:-int8}"
      LYRICS_WHISPER_BEAM_SIZE: "${LYRICS_WHISPER_BEAM_SIZE:-5}"
      LYRICS_WHISPER_VAD_FILTER: "${LYRICS_WHISPER_VAD_FILTER:-0}"
      LYRICS_WHISPER_LANGUAGE: "${LYRICS_WHISPER_LANGUAGE:-}"
      LYRICS_WHISPER_MODELS_DIR: "${LYRICS_WHISPER_MODELS_DIR:-/app/worker-models/faster-whisper}"
    volumes:
      - ${BEAT_STORAGE_HOST_PATH:-/var/lib/faceless-dancer/beat-storage}:/app/beat-storage
      - ${WORKER_MODELS_HOST_PATH:-/var/lib/faceless-dancer/worker-models}:/app/worker-models
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: faceless-dancer-server
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      separation-worker:
        condition: service_started
    env_file:
      - ./.env
    environment:
      PORT: "${PORT:-3001}"
      DATABASE_URL: "${DATABASE_URL_DOCKER:-postgresql://postgres:postgres@postgres:${POSTGRES_PORT:-5432}/faceless_dancer}"
      BEAT_SEPARATION_WORKER_URL: "http://separation-worker:${SEPARATION_WORKER_PORT:-8792}"
      DANCEOFF_REDIS_URL: "${DANCEOFF_REDIS_URL:-redis://redis:${REDIS_PORT:-6379}}"
      DANCEOFF_REDIS_USERNAME: "${DANCEOFF_REDIS_USERNAME:-}"
      DANCEOFF_REDIS_PASSWORD: "${DANCEOFF_REDIS_PASSWORD:-}"
      DANCEOFF_REDIS_TLS: "${DANCEOFF_REDIS_TLS:-false}"
      RUN_MIGRATIONS_ON_START: "${RUN_MIGRATIONS_ON_START:-false}"
    volumes:
      - ${BEAT_STORAGE_HOST_PATH:-/var/lib/faceless-dancer/beat-storage}:/app/beat-storage
    ports:
      - "127.0.0.1:${PORT:-3001}:${PORT:-3001}"
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: faceless-dancer-client
    depends_on:
      - server
    environment:
      SERVER_PORT: "${PORT:-3001}"
    ports:
      - "127.0.0.1:${CLIENT_DOCKER_PORT:-8080}:80"
    restart: unless-stopped
