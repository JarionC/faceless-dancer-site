name: Deploy faceless-dancer-site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: faceless-dancer-site-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 204.168.165.229 >> ~/.ssh/known_hosts

      - name: Clone or update repo on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@204.168.165.229 "
            set -e
            APP_DIR='${{ secrets.VPS_APP_DIR }}'
            REPO_URL='https://github.com/JarionC/faceless-dancer-site.git'

            mkdir -p \"\$APP_DIR\"

            if [ ! -d \"\$APP_DIR/.git\" ]; then
              rm -rf \"\$APP_DIR\"
              git clone \"\$REPO_URL\" \"\$APP_DIR\"
            else
              cd \"\$APP_DIR\"
              git fetch origin
              git reset --hard origin/main
            fi
          "

      - name: Write production env on VPS
        run: |
          printf '%s\n' "${{ secrets.ENV_FILE }}" | ssh ${{ secrets.VPS_USER }}@204.168.165.229 "cat > '${{ secrets.VPS_APP_DIR }}/.env'"

      - name: Deploy containers
        run: |
          ssh ${{ secrets.VPS_USER }}@204.168.165.229 "
            set -e
            cd '${{ secrets.VPS_APP_DIR }}'
            docker-compose down || true
            docker-compose up -d --build
          "
