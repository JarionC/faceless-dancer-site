name: Deploy faceless-dancer-site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: faceless-dancer-site-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 204.168.165.229 >> ~/.ssh/known_hosts

      - name: Sync repo to VPS
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./ ${{ secrets.VPS_USER }}@204.168.165.229:${{ secrets.VPS_APP_DIR }}/

      - name: Write production env on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@204.168.165.229 "mkdir -p '${{ secrets.VPS_APP_DIR }}'"
          printf '%s\n' "${{ secrets.ENV_FILE }}" | ssh ${{ secrets.VPS_USER }}@204.168.165.229 "cat > '${{ secrets.VPS_APP_DIR }}/.env'"

      - name: Deploy containers
        run: |
          ssh ${{ secrets.VPS_USER }}@204.168.165.229 "
            set -e
            cd '${{ secrets.VPS_APP_DIR }}'
            docker compose down --remove-orphans || true
            docker compose up -d --build --remove-orphans
          "
