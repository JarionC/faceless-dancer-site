name: Deploy faceless-dancer-site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: faceless-dancer-site-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy repo to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 204.168.165.229
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: ${{ secrets.VPS_APP_DIR }}
          rm: true
          strip_components: 0

      - name: Write .env on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        with:
          host: 204.168.165.229
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: ENV_FILE
          script: |
            mkdir -p "${{ secrets.VPS_APP_DIR }}"
            printf "%s" "$ENV_FILE" > "${{ secrets.VPS_APP_DIR }}/.env"

      - name: Deploy containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 204.168.165.229
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd "${{ secrets.VPS_APP_DIR }}"
            docker-compose down || true
            docker-compose up -d --build
